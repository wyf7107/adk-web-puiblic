<div>
  @if (currentUrl) {
    <div class="header-bar">
      <div class="image-title" [title]="currentUrl">{{ currentUrl }}</div>
      <button class="close-button" (click)="close()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="24px" height="24px">
          <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
        </svg>
      </button>
    </div>
  } @else {
    <button class="close-button" (click)="close()">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="24px" height="24px">
        <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
      </svg>
    </button>
  }

  @if (images.length > 1) {
    <button class="nav-button prev-button" (click)="prevImage()" [disabled]="currentIndex === 0">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="24px" height="24px">
        <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
      </svg>
    </button>
    <button class="nav-button next-button" (click)="nextImage()" [disabled]="currentIndex === images.length - 1">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="24px" height="24px">
        <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/>
      </svg>
    </button>
    <div class="image-counter">{{ currentIndex + 1 }} / {{ images.length }}</div>
  }

  @if (!isSvgContent) {
    <div class="image-wrapper" (click)="close()">
      @if (displayContent) {
        <div class="image-container" 
             (click)="$event.stopPropagation()"
             [ngStyle]="getTransformStyle()"
             (wheel)="onWheel($event)"
             (mousedown)="onMouseDown($event)"
             (mousemove)="onMouseMove($event)"
             (mouseup)="onMouseUp()"
             (mouseleave)="onMouseUp()"
             style="position: relative; display: inline-block;">
          <img [src]="displayContent" alt="Viewed Image">
          @if (shouldShowHighlight()) {
            <div class="highlight-circle" [ngStyle]="getHighlightStyle()"></div>
          }
        </div>
      }
      @if (!displayContent) {
        <div class="no-image-placeholder">
          No image data provided.
        </div>
      }
    </div>
  }

  @if (isSvgContent) {
    <div [innerHTML]="displayContent"></div>
  }
</div>
