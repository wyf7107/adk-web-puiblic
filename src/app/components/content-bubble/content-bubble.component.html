<div
  class="content-bubble type-{{ type }} role-{{ role }}"
  [class.content-bubble--highlighted]="isHighlighted"
  [class.eval-fail]="evalStatus === 2"
  [appJsonTooltip]="type === 'output' || type === 'error' ? outputFor : null"
  [appJsonTooltipTitle]="type === 'error' ? 'Error Details' : type === 'output' ? 'Node Output for' : ''"
>
  @if (type !== 'message') {
    <div class="output-chip-header">{{ type }}</div>
  }
  <ng-content></ng-content>
</div>
