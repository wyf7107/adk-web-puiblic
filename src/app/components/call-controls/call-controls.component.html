@if (isAudioRecording) {
  <button
    mat-icon-button
    (click)="toggleVideoRecording.emit()"
    class="video-rec-btn"
    [class.recording]="isVideoRecording"
    [matTooltip]="isVideoRecording ? i18n.turnOffCamTooltip : i18n.useCamTooltip"
    [disabled]="!isBidiStreamingEnabled"
  >
    <mat-icon>videocam</mat-icon>
  </button>
  <div class="mic-visualizer">
    <div class="bar" [style.height.px]="4 + micVolume * 16"></div>
    <div class="bar" [style.height.px]="4 + micVolume * 24"></div>
    <div class="bar" [style.height.px]="4 + micVolume * 18"></div>
    <div class="bar" [style.height.px]="4 + micVolume * 14"></div>
  </div>
}
<div class="call-btn-container" (mouseenter)="showFlags = true" (mouseleave)="showFlags = false">
  <button
    mat-icon-button
    (click)="onCallClick()"
    class="audio-rec-btn"
    [class.recording]="isAudioRecording"
    [disabled]="!isBidiStreamingEnabled"
  >
    <mat-icon>{{ isAudioRecording ? 'call_end' : 'call' }}</mat-icon>
  </button>

  @if (showFlags && !isAudioRecording) {
    <div class="flags-panel">
      <div class="flags-title">Live Flags</div>
      <div class="flag-item">
        <mat-checkbox [checked]="flags.proactiveAudio" (change)="flags.proactiveAudio = $event.checked" [matTooltip]="i18n.proactiveAudioTooltip" matTooltipPosition="left">Proactive Audio</mat-checkbox>
      </div>
      <div class="flag-item">
        <mat-checkbox [checked]="flags.enableAffectiveDialog" (change)="flags.enableAffectiveDialog = $event.checked" [matTooltip]="i18n.affectiveDialogTooltip" matTooltipPosition="left">Affective Dialog</mat-checkbox>
      </div>
      <div class="flag-item">
        <mat-checkbox [checked]="flags.enableSessionResumption" (change)="flags.enableSessionResumption = $event.checked" [matTooltip]="i18n.sessionResumptionTooltip" matTooltipPosition="left">Session Resumption</mat-checkbox>
      </div>
      <div class="flag-item">
        <mat-checkbox [checked]="flags.saveLiveBlob" (change)="flags.saveLiveBlob = $event.checked" [matTooltip]="i18n.saveLiveBlobTooltip" matTooltipPosition="left">Save Live Blob</mat-checkbox>
      </div>
    </div>
  }
</div>
