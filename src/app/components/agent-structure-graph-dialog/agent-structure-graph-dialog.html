<h2 mat-dialog-title>Agent Structure Graph</h2>

<mat-dialog-content class="dialog-content">
  <div class="graph-container">
    @if (isLoading()) {
      <div class="loading-container">
        <mat-spinner diameter="50"></mat-spinner>
        <p>Loading agent structure...</p>
      </div>
    } @else if (errorMessage()) {
      <div class="error-container">
        <mat-icon class="error-icon">error_outline</mat-icon>
        <p class="error-message">{{ errorMessage() }}</p>
      </div>
    } @else if (renderedGraph()) {
      <p class="agent-info">Agent: <strong>{{ appName }}</strong></p>
      <div class="svg-container" [innerHTML]="renderedGraph()"></div>
    } @else {
      <div class="no-graph-container">
        <mat-icon class="large-icon">account_tree</mat-icon>
        <p>Agent structure graph not available.</p>
      </div>
    }
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Close</button>
</mat-dialog-actions>
